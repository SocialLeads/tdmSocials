server {
    listen 80;
    server_name _; # replace with your domain

    # Redirect all traffic to backend
    location / {
        proxy_pass http://backend_api_prod:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: health checks
    location /health/live { proxy_pass http://backend_api_prod:3000/health/live; }
    location /health/ready { proxy_pass http://backend_api_prod:3000/health/ready; }
}
