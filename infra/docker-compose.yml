services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend_admin
      - frontend_public
      - backend_blue
      - backend_green

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./env/backend.env
    environment:
      POSTGRES_USER: ${DB_USER:-nestuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-backend_db}
    volumes:
      - pg_data:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    expose:
      - "6379"

  backend_blue:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./env/backend.env
    depends_on:
      - db
      - redis
    expose:
      - "4000"

  backend_green:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./env/backend.env
    depends_on:
      - db
      - redis
    expose:
      - "4000"

  frontend_admin:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: /api
    restart: unless-stopped
    expose:
      - "3000"

  frontend_public:
    build:
      context: ../frontend-public
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: /api
    restart: unless-stopped
    expose:
      - "3001"

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  redis_data:
